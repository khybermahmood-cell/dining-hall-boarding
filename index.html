<style>

        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }
    
    .board {
        background: #000000;
        padding: 12px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100%;
        overflow: hidden;
    }
    
    /* Header - fixed height */
    .header {
        background: linear-gradient(135deg, #1A3A6C 0%, #122a4a 100%);
        padding: 8px 16px;
        border-radius: 10px;
        border-left: 4px solid #FFF38C;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: nowrap;
        gap: 10px;
        margin-bottom: 8px;
        flex-shrink: 0;
    }
    
    .brand h1 {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #FFFFFF 0%, #A1D6E6 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin: 0;
        white-space: nowrap;
    }
    
    .brand p {
        font-size: 8px;
        color: #A1D6E6;
        margin-top: 2px;
        white-space: nowrap;
    }
    
    .live-time {
        font-size: 22px;
        font-weight: 800;
        color: #FFF38C;
        font-family: monospace;
        background: rgba(0,0,0,0.5);
        padding: 4px 12px;
        border-radius: 30px;
        border: 1px solid rgba(255,243,140,0.3);
        white-space: nowrap;
    }
    
    /* Info bar - fixed height */
    .info-bar {
        background: linear-gradient(135deg, #1A3A6C 0%, #122a4a 100%);
        padding: 6px 16px;
        border-radius: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: nowrap;
        gap: 10px;
        margin-bottom: 8px;
        flex-shrink: 0;
    }
    
    .boarding-now {
        font-size: 11px;
        font-weight: 700;
        color: #FFFFFF;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
    }
    
    .boarding-now span {
        background: #FFF38C;
        color: #000000;
        padding: 2px 8px;
        border-radius: 25px;
        font-size: 12px;
        font-weight: 800;
    }
    
    .waiting-info {
        font-size: 9px;
        color: #A1D6E6;
        white-space: nowrap;
    }
    
    /* MAIN CONTENT - TAKES ALL REMAINING SPACE */
    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 0;
        overflow: hidden;
    }
    
    /* Flights board */
    .flights-board {
        background: #000000;
        border-radius: 10px;
        border: 1px solid #1A3A6C;
        flex: 3;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }
    
    .board-header {
        display: grid;
        grid-template-columns: 80px 55px 1fr 90px;
        background: linear-gradient(135deg, #1A3A6C 0%, #122a4a 100%);
        padding: 6px 12px;
        border-bottom: 2px solid #FFF38C;
        font-size: 9px;
        font-weight: 800;
        color: #FFFFFF;
        text-transform: uppercase;
        flex-shrink: 0;
    }
    
    .flight-rows-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
    }
    
    .flight-row {
        display: grid;
        grid-template-columns: 80px 55px 1fr 90px;
        padding: 8px 12px;
        border-bottom: 1px solid #1A3A6C;
        align-items: center;
        flex-shrink: 0;
    }
    
    .flight-row:last-child {
        border-bottom: none;
    }
    
    .flight-row.boarding {
        background: rgba(26,58,108,0.4);
        border-left: 3px solid #CDE6B4;
        animation: rowPulse 1.5s infinite;
    }
    
    @keyframes rowPulse {
        0%, 100% { background: rgba(26,58,108,0.4); }
        50% { background: rgba(26,58,108,0.6); }
    }
    
    .flight-time {
        font-size: 12px;
        font-weight: 800;
        color: #FFF38C;
        font-family: monospace;
    }
    
    .flight-gate {
        font-size: 12px;
        font-weight: 800;
        color: #A1D6E6;
        font-family: monospace;
    }
    
    .flight-destination {
        font-size: 16px;
        font-weight: 800;
        color: #FFFFFF;
        font-family: monospace;
    }
    
    .flight-status {
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
    }
    
    .status-boarding {
        color: #CDE6B4;
        animation: blink 0.8s infinite;
        background: rgba(205,230,180,0.1);
        padding: 2px 6px;
        border-radius: 20px;
        display: inline-block;
        width: fit-content;
    }
    
    .status-closed {
        color: #D1D1D1;
        background: rgba(209,209,209,0.1);
        padding: 2px 6px;
        border-radius: 20px;
        display: inline-block;
    }
    
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
    }
    
    /* Upcoming section */
    .upcoming-section {
        background: #000000;
        border-radius: 10px;
        border: 1px solid #1A3A6C;
        flex: 2;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }
    
    .section-title {
        background: linear-gradient(135deg, #1A3A6C 0%, #122a4a 100%);

        font-size: 8px;
        font-weight: 800;
        color: #FFF38C;
        text-transform: uppercase;
        border-bottom: 1px solid #A1D6E6;
        display: flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
    }
    
    .section-title::before {
        content: '✈';
        font-size: 9px;
        animation: takeoff 2s infinite;
    }
    
    @keyframes takeoff {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(3px); }
    }
    
    .upcoming-flights-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
    }
    
    .upcoming-flight {
        display: grid;
        grid-template-columns: 65px 1fr;
        padding: 6px 12px;
        border-bottom: 1px solid #1A3A6C;
        align-items: center;
        flex-shrink: 0;
    }
    
    .upcoming-flight:last-child {
        border-bottom: none;
    }
    
    .upcoming-time {
        font-size: 11px;
        font-weight: 800;
        color: #FFF38C;
        font-family: monospace;
    }
    
    .upcoming-classes {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
    }
    
    .class-tag {
        background: linear-gradient(135deg, #1A3A6C 0%, #122a4a 100%);
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 9px;
        font-weight: 600;
        color: #FFFFFF;
        border: 1px solid rgba(161,214,230,0.2);
    }
    
    .class-tag strong {
        color: #FFF38C;
        margin-right: 3px;
    }
    
    /* Waiting area - NO EXTRA SPACE */
    .waiting-area {
        background: linear-gradient(135deg, #1A3A6C 0%, #122a4a 100%);
        padding: 6px 12px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(161,214,230,0.3);
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
        margin-top: 0;
    }
    
    .waiting-area::before {
        content: '✦';
        position: absolute;
        top: 4px;
        left: 8px;
        font-size: 14px;
        color: rgba(255,243,140,0.1);
    }
    
    .waiting-area::after {
        content: '✦';
        position: absolute;
        bottom: 4px;
        right: 8px;
        font-size: 14px;
        color: rgba(255,243,140,0.1);
    }
    
    .waiting-area h3 {
        font-size: 10px;
        color: #FFF38C;
        margin-bottom: 2px;
    }
    
    .waiting-area p {
        font-size: 8px;
        color: #A1D6E6;
    }
    
    /* Status screens */
    .status-screen {
        text-align: center;
        padding: 30px 20px;
        background: #000000;
        border-radius: 10px;
        border: 1px solid #1A3A6C;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    
    .status-screen h2 {
        font-size: 20px;
        color: #FFF38C;
        margin-bottom: 8px;
    }
    
    .status-screen p {
        font-size: 12px;
        color: #A1D6E6;
    }
    
    /* Hide scrollbars */
    .flight-rows-container::-webkit-scrollbar,
    .upcoming-flights-container::-webkit-scrollbar {
        display: none;
    }
    
    /* Responsive */
    @media (max-height: 700px) {
        .flight-row { padding: 5px 12px; }
        .flight-destination { font-size: 14px; }

        .brand h1 { font-size: 16px; }
        .waiting-area { padding: 4px 10px; }
        .waiting-area h3 { font-size: 9px; }
        .waiting-area p { font-size: 7px; }
    }
</style>

    // REAL-TIME CLOCK
    function updateRealTimeClock() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('sv-SE');
        document.getElementById('liveTime').innerText = timeString;
    }
    
    updateRealTimeClock();
    setInterval(updateRealTimeClock, 1000);

    function getTodayName() {
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        return days[new Date().getDay()];
    }

    function parseTime(timeStr) {
        const match = timeStr.match(/(\d{1,2}):(\d{2}):(\d{2})\s+(AM|PM)/i);
        if (!match) return null;
        let hour = parseInt(match[1]);
        const minute = parseInt(match[2]);
        const ampm = match[4].toUpperCase();
        if (ampm === 'PM' && hour !== 12) hour += 12;
        if (ampm === 'AM' && hour === 12) hour = 0;
        return { hour, minute, total: hour * 60 + minute };
    }

    function updateDisplay() {
        const todayName = getTodayName();
        const schedule = SCHEDULE[todayName];
        
        if (!schedule) {
            document.getElementById('content').innerHTML = '<div class="status-screen"><h2>⏰ NO SCHEDULE</h2><p>No schedule found for ' + todayName + '</p></div>';
            document.getElementById('boardingCount').innerText = '0';
            return;
        }

        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        
        const parsedSchedule = schedule.map(item => ({
            ...item,
            timeMinutes: parseTime(item.time)?.total || 0
        }));
        
        let currentSlot = null;
        let currentIndex = -1;
        
        for (let i = 0; i < parsedSchedule.length; i++) {
            if (currentMinutes >= parsedSchedule[i].timeMinutes) {
                currentSlot = parsedSchedule[i];
                currentIndex = i;
            }
        }
        
        if (!currentSlot && parsedSchedule.length > 0) {
            const firstSlot = parsedSchedule[0];
            document.getElementById('content').innerHTML = '<div class="status-screen"><h2>✈ FIRST DEPARTURE AT ' + firstSlot.time + '</h2><p>Please wait. Boarding will begin soon.</p></div>';
            document.getElementById('boardingCount').innerText = '0';
            return;
        }
        
        if (currentSlot && currentSlot.t1 === 'END') {
            document.getElementById('content').innerHTML = '<div class="status-screen"><h2>🔒 LUNCH SERVICE ENDED</h2><p>Thank you for dining with us. See you tomorrow!</p></div>';
            document.getElementById('boardingCount').innerText = '0';
            return;
        }
        
        const nextSlot = parsedSchedule[currentIndex + 1] || null;
        const afterSlot = parsedSchedule[currentIndex + 2] || null;
        
        const tables = [
            { name: "T1", class: currentSlot.t1 },
            { name: "T2", class: currentSlot.t2 },
            { name: "T3", class: currentSlot.t3 },
            { name: "T4", class: currentSlot.t4 },
            { name: "T5", class: currentSlot.t5 },
            { name: "T6", class: currentSlot.t6 }
        ];
        
        const activeTables = tables.filter(t => t.class !== 'END' && t.class !== '—');
        document.getElementById('boardingCount').innerText = activeTables.length;
        
        let html = `
            <div class="flights-board">
                <div class="board-header">
                    <div>TIME</div>
                    <div>TABLE</div>
                    <div>CLASS</div>
                    <div>STATUS</div>
                </div>
                <div class="flight-rows-container">
        `;
        
        tables.forEach(table => {
            const isActive = table.class !== 'END' && table.class !== '—';
            html += `
                <div class="flight-row ${isActive ? 'boarding' : ''}">
                    <div class="flight-time">${currentSlot.time}</div>
                    <div class="flight-gate">${table.name}</div>
                    <div class="flight-destination">${table.class}</div>
                    <div class="flight-status ${isActive ? 'status-boarding' : 'status-closed'}">
                        ${isActive ? '🔔 BOARDING NOW' : 'CLOSED'}
                    </div>
                </div>
            `;
        });
        
        html += `</div></div>`;
        
        if (nextSlot || afterSlot) {
            html += `<div class="upcoming-section"><div class="section-title">UPCOMING DEPARTURES</div><div class="upcoming-flights-container">`;
            
            if (nextSlot && nextSlot.t1 !== 'END') {
                const nextTables = [
                    { name: "T1", class: nextSlot.t1 }, { name: "T2", class: nextSlot.t2 },
                    { name: "T3", class: nextSlot.t3 }, { name: "T4", class: nextSlot.t4 },
                    { name: "T5", class: nextSlot.t5 }, { name: "T6", class: nextSlot.t6 }
                ];
                html += `<div class="upcoming-flight"><div class="upcoming-time">${nextSlot.time}</div><div class="upcoming-classes">`;
                html += nextTables.filter(t => t.class !== 'END').map(t => `<div class="class-tag"><strong>${t.name}:</strong> ${t.class}</div>`).join('');
                html += `</div></div>`;
            }
            
            if (afterSlot && afterSlot.t1 !== 'END') {
                const afterTables = [
                    { name: "T1", class: afterSlot.t1 }, { name: "T2", class: afterSlot.t2 },
                    { name: "T3", class: afterSlot.t3 }, { name: "T4", class: afterSlot.t4 },
                    { name: "T5", class: afterSlot.t5 }, { name: "T6", class: afterSlot.t6 }
                ];
                html += `<div class="upcoming-flight"><div class="upcoming-time">${afterSlot.time}</div><div class="upcoming-classes">`;
                html += afterTables.filter(t => t.class !== 'END').map(t => `<div class="class-tag"><strong>${t.name}:</strong> ${t.class}</div>`).join('');
                html += `</div></div>`;
            }
            
            html += `</div></div>`;
        }
        
        html += `
            <div class="waiting-area">
                <h3>🚪 DINING HALL ENTRANCE</h3>
                <p>When you see your class under "BOARDING NOW", proceed to your assigned table</p>
            </div>
        `;
        
        document.getElementById('content').innerHTML = html;
    }
    
    updateDisplay();
    setInterval(updateDisplay, 30000);
</script>
</div>
